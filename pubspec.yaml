name: cmark_gfm_widget
version: 0.1.0
publish_to: 'none'
description: A lightweight Flutter renderer for GitHub Flavored Markdown powered by cmark-gfm-dart.
homepage: https://example.com

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  cmark_gfm:
    git:
      url: https://github.com/Telosnex/cmark-gfm-dart.git
  # NOTE: do not add flutter_highlight here. Its pubspec depends on highlight
  # via `path: ../highlight`, which pub rewrites into a commit-hash-pinned git
  # dep that conflicts with any branch-ref dep on highlight ("version solving
  # failed" naming two refs of the same repo). The one theme we used from it
  # is vendored in lib/src/theme/a11y_dark_theme.dart.
  highlight:
    git:
      url: https://github.com/Telosnex/highlight.dart.git
      path: highlight
      ref: telosnex/limited-languages
  pixel_snap: ^0.1.5
    # Forked because the original package was abandoned some years ago.
  flutter_math_fork:
    git:
      url: https://github.com/Telosnex/flutter_math_fork_fork.git
      ref: master
  vector_math: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  test: ^1.26.3
  path: 

flutter:
